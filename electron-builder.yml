appId: com.jarvest.reminder
productName: Jarvest Reminder
publish:
  provider: github
  owner: thanguc
  repo: jarvest-reminder
directories:
  buildResources: resources
  output: dist
extraResources:
  - from: resources/icon.png
    to: resources/icon.png
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierrc.*,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
